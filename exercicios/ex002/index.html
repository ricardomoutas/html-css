<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Paragrafos e Quebras de linha</h1>
    <hr>
    <p>
        É possivel &lt; escrever&gt; um parágrafos de qualquer maneira.
        besta inserir o texto entre &lt;p&gt; e &lt;/p&gt;
        <!--LESS THAN / GREATER THAN -->
    </p>
    <p>
        Se eu precisar de fazer uma quebra de texto num <br> determinado lugar, então temos de usar tag br.
    </p>
    <P>Vamos adicionar alguns simbolos especiais
        &reg;
        &copy;
        &trade;
        &euro;
        &pound;
        &yen;
        &cent;
        &Delta;
    </P>
</body>
</html>
