<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Exercício de Pseudo-classes (:hover) </title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 30px;
        }

        .caixas {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }

        .caixa {
            width: 200px;
            height: 200px;
            background-color: #dcdcdc;
            border: 1px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .caixa:hover {
            background-color: yellow;
            color: red;
        }

        .bloco-hover {
            width: 300px;
        }

        .bloco-hover .detalhes {
            display: none;
            background-color: red;
            color: white;
            padding: 10px;
            margin-top: 10px;
        }

        .bloco-hover:hover .detalhes {
            display: block;
        }
    </style>
</head>
<body>

    <h1>Exercício de Pseudo-classes – Ricardo Rodrigues (:hover)</h1>

    <div class="caixas">
        <div class="caixa">Informação 1</div>
        <div class="caixa">Informação 2</div>
        <div class="caixa">Informação 3</div>
    </div>

    <div class="bloco-hover">
        <p>Passe o rato sobre este bloco para ver mais detalhes.</p>
        <p class="detalhes">
            Detalhes escondidos: este texto só aparece quando o rato está sobre o bloco.
        </p>
    </div>

</body>
</html>
